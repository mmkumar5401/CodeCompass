name: Publish to PyPI

on:
  push:
    tags: ['v*.*.*']
    branches: [main]

jobs:
  check-version:
    name: Check if pyproject.toml version is unpublished
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compare local version to latest on PyPI
        id: check
        run: |
          LOCAL_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          PUBLISHED_VERSION=$(curl -sf https://pypi.org/pypi/codecompass-mcp/json | python3 -c "import sys, json; print(json.load(sys.stdin).get('info', {}).get('version', ''))" || echo "")
          echo "local=$LOCAL_VERSION published=$PUBLISHED_VERSION"
          echo "version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          if [ -n "$LOCAL_VERSION" ] && [ "$LOCAL_VERSION" != "$PUBLISHED_VERSION" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  pypi-publish:
    name: Build and publish to PyPI
    needs: check-version
    if: needs.check-version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          check-latest: false

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
